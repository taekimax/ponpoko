name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Check remote ROM base URL
        env:
          ARCADE_SAFARI_ROM_BASE_URL: ${{ vars.ARCADE_SAFARI_ROM_BASE_URL }}
        run: |
          if [ -z "$ARCADE_SAFARI_ROM_BASE_URL" ]; then
            echo "::error::Set repository variable ARCADE_SAFARI_ROM_BASE_URL to an authorized ROM host before deploying Pages."
            exit 1
          fi
      - run: npm run prepare:roms
        env:
          ARCADE_SAFARI_SKIP_ROMS: "1"
      - run: npm test
      - run: npm run build
        env:
          VITE_ROM_BASE_URL: ${{ vars.ARCADE_SAFARI_ROM_BASE_URL }}
      - run: npm run smoke
        env:
          ARCADE_SAFARI_SKIP_ROMS: "1"
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v4
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
